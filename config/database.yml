default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: condominium_tickets_development
  username: condominium
  password: password123
  host: localhost
  port: 5432

test:
  <<: *default
  database: condominium_tickets_test
  username: condominium
  password: password123
  host: localhost
  port: 5432


production:
  primary: &primary_production
    <<: *default
    database: condominium_tickets_production
    username: condominium_tickets
    password: <%= ENV["CONDOMINIUM_TICKETS_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: condominium_tickets_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: condominium_tickets_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: condominium_tickets_production_cable
    migrations_paths: db/cable_migrate
