services:
  db:
    image: postgres:14
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: condominium
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: condominium_tickets_development
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U condominium -d condominium_tickets_development"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: rails_app
    volumes:
      - .:/app
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: db
    command: >
      bash -c "
        rm -f tmp/pids/server.pid &&
        echo 'Aguardando banco ficar pronto...' &&
        sleep 5 &&
        bundle install &&
        rails db:create db:migrate db:seed &&
        rails server -b 0.0.0.0 -p 3000
      "

volumes:
  postgres_data: